<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}hashcards{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#EEF2FF',
                            100: '#E0E7FF',
                            200: '#C7D2FE',
                            400: '#818CF8',
                            500: '#6366F1',
                            600: '#4F46E5',
                            700: '#4338CA',
                            900: '#312E81',
                        }
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.35s ease both',
                        'reveal': 'reveal 0.2s ease both',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%':   { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        reveal: {
                            '0%':   { opacity: '0', transform: 'scale(0.97)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                    }
                }
            }
        }
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
        /* Cloze states */
        .cloze-hidden {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
        }
        .cloze-revealed {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            animation: reveal 0.2s ease both;
        }
        @media (prefers-color-scheme: dark) {
            .cloze-hidden  { background: #451a03; color: #fcd34d; }
            .cloze-revealed{ background: #064e3b; color: #6ee7b7; }
        }
        @keyframes reveal {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-100 font-sans">

    <!-- Skip to content (a11y) -->
    <a href="#main" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-50 focus:px-3 focus:py-2 focus:bg-brand-600 focus:text-white focus:rounded-md focus:text-sm focus:font-medium">
        Skip to content
    </a>

    <!-- Top nav -->
    <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/80 backdrop-blur-md dark:border-slate-800 dark:bg-slate-950/80">
        <div class="mx-auto max-w-3xl px-4 sm:px-6">
            <nav class="flex h-14 items-center justify-between" aria-label="Main navigation">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-2 rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 dark:focus:ring-offset-slate-950" aria-label="hashcards home">
                    <span class="font-mono text-lg font-bold tracking-tight text-brand-600 dark:text-brand-400">#</span>
                    <span class="text-base font-semibold text-slate-900 dark:text-slate-100">hashcards</span>
                </a>

                <!-- Nav links -->
                <div class="flex items-center gap-1" role="list">
                    <a href="/" role="listitem"
                       class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100">
                        Home
                    </a>
                    <a href="/study" role="listitem"
                       class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100">
                        Study
                    </a>
                    <a href="/browse" role="listitem"
                       class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100">
                        Browse
                    </a>
                    <a href="/stats" role="listitem"
                       class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100">
                        Stats
                    </a>
                    <a href="/generate" role="listitem"
                       class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-600 transition-colors duration-150 hover:bg-slate-100 hover:text-slate-900 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-100">
                        Generate
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <!-- Page content -->
    <main id="main" class="mx-auto max-w-3xl px-4 py-8 sm:px-6 animate-fade-up">
        {% block content %}{% endblock %}
    </main>

    <!-- Global keyboard handler -->
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
            {% block keyboard_shortcuts %}{% endblock %}
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
